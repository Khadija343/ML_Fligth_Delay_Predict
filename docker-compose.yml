services:

  backend:
    build:
      context: ./backend
    container_name: flight-delay-backend

    ports:
      - "5000:5000"

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    container_name: flight-delay-frontend

    ports:
      - "5173:5173"

    environment:
      VITE_API_URL: http://backend:5000

    depends_on:
      - backend

    restart: unless-stopped